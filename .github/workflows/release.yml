name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  create-release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create.outputs.release_id }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Read version from package.json
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"
        shell: bash

      - name: Check if prerelease
        id: check
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if [[ "$VERSION" == *"-"* ]]; then
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
          fi
        shell: bash

      - name: Create release
        id: create
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          IS_PRE="${{ steps.check.outputs.is_prerelease }}"
          DRAFT=$( [ "$IS_PRE" = "true" ] && echo "false" || echo "true" )
          PRE=$( [ "$IS_PRE" = "true" ] && echo "true" || echo "false" )

          RELEASE_ID=$(gh api repos/${{ github.repository }}/releases \
            -f tag_name="${GITHUB_REF_NAME}" \
            -f name="Stock Helper v${VERSION}" \
            -f body="A股量化选股助手 v${VERSION}

          ### 下载说明
          - **macOS (Apple Silicon)**: 下载 \`_aarch64.dmg\` 文件
          - **macOS (Intel)**: 下载 \`_x64.dmg\` 文件
          - **Windows**: 下载 \`.msi\` 或 \`.exe\` 安装包" \
            -F draft="$DRAFT" \
            -F prerelease="$PRE" \
            --jq '.id')

          echo "release_id=$RELEASE_ID" >> $GITHUB_OUTPUT
          echo "Created release ID: $RELEASE_ID"
        shell: bash

  build:
    needs: create-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
          - platform: windows-latest
            args: ''
    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Sync versions
        run: |
          VERSION="${{ needs.create-release.outputs.version }}"
          # 去掉预发布后缀，MSI 只支持纯数字版本
          BASE_VERSION="${VERSION%%-*}"
          sed -i.bak "s/^version = \".*\"/version = \"$BASE_VERSION\"/" src-tauri/Cargo.toml
          rm -f src-tauri/Cargo.toml.bak
          sed -i.bak "s/\"version\": \".*\"/\"version\": \"$BASE_VERSION\"/" src-tauri/tauri.conf.json
          rm -f src-tauri/tauri.conf.json.bak
        shell: bash

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and upload
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: ${{ matrix.args }}
